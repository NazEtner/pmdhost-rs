# WSL2(Linux)から Windows向けにクロスビルドする前提。
# このcrateは libx86emu(C)を同梱リンクし、Windows名前付きパイプに接続するため、
# ターゲットは x86_64-pc-windows-gnu(MinGW)固定で運用する。
#   WSL2側準備: sudo apt install mingw-w64 / rustup target add x86_64-pc-windows-gnu
[build]
target = "x86_64-pc-windows-gnu"

[target.x86_64-pc-windows-gnu]
linker = "x86_64-w64-mingw32-gcc"
ar = "x86_64-w64-mingw32-ar"
